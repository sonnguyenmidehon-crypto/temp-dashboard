<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Temp & Humi</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    display: flex;
    gap: 30px;
    background: white;
    padding: 20px 30px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.item {
    text-align: center;
}

.icon {
    font-size: 40px;
}

.value {
    font-size: 28px;
    font-weight: bold;
    margin-top: 5px;
}

.label {
    font-size: 14px;
    color: gray;
}
</style>

</head>

<body>

<div class="box">

    <div class="item">
        <div class="icon">☀️</div>
        <div class="value" id="temp">-- °C</div>
        <div class="label">Temperature</div>
    </div>

    <div class="item">
        <div class="icon">💧</div>
        <div class="value" id="humi">-- %</div>
        <div class="label">Humidity</div>
    </div>

</div>

<script>
document.getElementById("temp").innerText = "31.39 °C";
document.getElementById("humi").innerText = "80.32 %";
</script>

</body>
</html>
